<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer casing -->
  <rect x="4" y="20" width="56" height="24" rx="5" ry="5" fill="#2A2A2A" stroke="#555" stroke-width="1.5"/>
  <!-- Glass tube body -->
  <rect x="10" y="26" width="44" height="12" rx="6" ry="6" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Tube highlight -->
  <rect x="10" y="26" width="44" height="5" rx="3" ry="3" fill="#1A1A1A" opacity="0.6"/>
  <!-- Center mark lines -->
  <line x1="32" y1="24" x2="32" y2="40" stroke="#F5C22B" stroke-width="1.5" opacity="0.8"/>
  <line x1="26" y1="27" x2="26" y2="37" stroke="#555" stroke-width="1"/>
  <line x1="38" y1="27" x2="38" y2="37" stroke="#555" stroke-width="1"/>
  <!-- Bubble -->
  <ellipse cx="32" cy="32" rx="6" ry="5" fill="none" stroke="#4EBA74" stroke-width="1.5"/>
  <ellipse cx="32" cy="32" rx="4" ry="3.5" fill="#4EBA74" opacity="0.3"/>
  <ellipse cx="30" cy="30" rx="1.5" ry="1" fill="#4EBA74" opacity="0.6"/>
  <!-- End caps -->
  <circle cx="10" cy="32" r="5" fill="#1C1C1C" stroke="#444" stroke-width="1"/>
  <circle cx="54" cy="32" r="5" fill="#1C1C1C" stroke="#444" stroke-width="1"/>
  <!-- Top screws -->
  <circle cx="14" cy="22" r="2" fill="#333" stroke="#555" stroke-width="0.5"/>
  <line x1="13" y1="22" x2="15" y2="22" stroke="#666" stroke-width="0.5"/>
  <circle cx="50" cy="22" r="2" fill="#333" stroke="#555" stroke-width="0.5"/>
  <line x1="49" y1="22" x2="51" y2="22" stroke="#666" stroke-width="0.5"/>
</svg>
