<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ruler body -->
  <rect x="4" y="22" width="56" height="20" rx="3" ry="3" fill="#2A2A2A" stroke="#555" stroke-width="1.5"/>
  <!-- Top edge highlight -->
  <rect x="4" y="22" width="56" height="3" rx="2" ry="2" fill="#3A3A3A"/>
  <!-- Tick marks - large (every 10mm) -->
  <line x1="14" y1="22" x2="14" y2="30" stroke="#F5C22B" stroke-width="1.5"/>
  <line x1="24" y1="22" x2="24" y2="30" stroke="#F5C22B" stroke-width="1.5"/>
  <line x1="34" y1="22" x2="34" y2="30" stroke="#F5C22B" stroke-width="1.5"/>
  <line x1="44" y1="22" x2="44" y2="30" stroke="#F5C22B" stroke-width="1.5"/>
  <line x1="54" y1="22" x2="54" y2="30" stroke="#F5C22B" stroke-width="1.5"/>
  <!-- Tick marks - medium (every 5mm) -->
  <line x1="9" y1="22" x2="9" y2="27" stroke="#888" stroke-width="1"/>
  <line x1="19" y1="22" x2="19" y2="27" stroke="#888" stroke-width="1"/>
  <line x1="29" y1="22" x2="29" y2="27" stroke="#888" stroke-width="1"/>
  <line x1="39" y1="22" x2="39" y2="27" stroke="#888" stroke-width="1"/>
  <line x1="49" y1="22" x2="49" y2="27" stroke="#888" stroke-width="1"/>
  <!-- Tick marks - small (every 1mm) -->
  <line x1="6" y1="22" x2="6" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="11" y1="22" x2="11" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="16" y1="22" x2="16" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="21" y1="22" x2="21" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="26" y1="22" x2="26" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="31" y1="22" x2="31" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="36" y1="22" x2="36" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="41" y1="22" x2="41" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="46" y1="22" x2="46" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="51" y1="22" x2="51" y2="25" stroke="#555" stroke-width="0.8"/>
  <line x1="56" y1="22" x2="56" y2="25" stroke="#555" stroke-width="0.8"/>
  <!-- Numbers -->
  <text x="14" y="38" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">1</text>
  <text x="24" y="38" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">2</text>
  <text x="34" y="38" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">3</text>
  <text x="44" y="38" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">4</text>
  <!-- Marker A -->
  <line x1="20" y1="22" x2="20" y2="42" stroke="#F5C22B" stroke-width="2"/>
  <rect x="17" y="39" width="10" height="5" rx="1" fill="#F5C22B"/>
  <text x="22" y="43.5" text-anchor="middle" font-family="monospace" font-size="4" font-weight="bold" fill="#1A1A1A">A</text>
</svg>
