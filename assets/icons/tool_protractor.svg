<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Protractor semicircle body -->
  <path d="M 8 44 A 24 24 0 0 1 56 44 Z" fill="#1C1C1C" stroke="#555" stroke-width="1.5"/>
  <!-- Inner arc -->
  <path d="M 14 44 A 18 18 0 0 1 50 44 Z" fill="#111" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Degree marks outer -->
  <line x1="32" y1="20" x2="32" y2="25" stroke="#F5C22B" stroke-width="1.5"/>
  <line x1="8" y1="44" x2="13" y2="44" stroke="#F5C22B" stroke-width="1.5"/>
  <line x1="56" y1="44" x2="51" y2="44" stroke="#F5C22B" stroke-width="1.5"/>
  <!-- 45 degree marks -->
  <line x1="14.7" y1="27.3" x2="18.2" y2="30.8" stroke="#888" stroke-width="1"/>
  <line x1="49.3" y1="27.3" x2="45.8" y2="30.8" stroke="#888" stroke-width="1"/>
  <!-- Degree labels -->
  <text x="32" y="19" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">90</text>
  <text x="7" y="43" text-anchor="end" font-family="monospace" font-size="5" fill="#888">0</text>
  <text x="57" y="43" text-anchor="start" font-family="monospace" font-size="5" fill="#888">180</text>
  <!-- Arm A (yellow) -->
  <line x1="32" y1="44" x2="14" y2="26" stroke="#F5C22B" stroke-width="2"/>
  <!-- Arm B (chrome) -->
  <line x1="32" y1="44" x2="50" y2="26" stroke="#CCCCCC" stroke-width="2"/>
  <!-- Center pivot -->
  <circle cx="32" cy="44" r="3.5" fill="#F5C22B" stroke="#CC9F1C" stroke-width="1"/>
  <circle cx="32" cy="44" r="1.5" fill="#1A1A1A"/>
  <!-- Base line -->
  <line x1="8" y1="44" x2="56" y2="44" stroke="#555" stroke-width="1"/>
</svg>
