<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Microphone body -->
  <rect x="24" y="8" width="16" height="26" rx="8" ry="8" fill="#2A2A2A" stroke="#555" stroke-width="1.5"/>
  <!-- Mic grille lines -->
  <line x1="24" y1="16" x2="40" y2="16" stroke="#444" stroke-width="0.8"/>
  <line x1="24" y1="20" x2="40" y2="20" stroke="#444" stroke-width="0.8"/>
  <line x1="24" y1="24" x2="40" y2="24" stroke="#444" stroke-width="0.8"/>
  <line x1="24" y1="28" x2="40" y2="28" stroke="#444" stroke-width="0.8"/>
  <!-- Mic highlight -->
  <rect x="26" y="9" width="5" height="14" rx="2.5" ry="2.5" fill="#3A3A3A" opacity="0.5"/>
  <!-- Stand arm -->
  <path d="M 18 34 Q 18 42 32 42 Q 46 42 46 34" fill="none" stroke="#888" stroke-width="2"/>
  <!-- Stand base -->
  <line x1="32" y1="42" x2="32" y2="52" stroke="#888" stroke-width="2"/>
  <rect x="20" y="52" width="24" height="4" rx="2" fill="#2A2A2A" stroke="#555" stroke-width="1"/>
  <!-- Sound waves -->
  <path d="M 10 24 Q 8 32 10 40" fill="none" stroke="#F5C22B" stroke-width="1.5" opacity="0.7"/>
  <path d="M 6 20 Q 3 32 6 44" fill="none" stroke="#F5C22B" stroke-width="1" opacity="0.4"/>
  <path d="M 54 24 Q 56 32 54 40" fill="none" stroke="#F5C22B" stroke-width="1.5" opacity="0.7"/>
  <path d="M 58 20 Q 61 32 58 44" fill="none" stroke="#F5C22B" stroke-width="1" opacity="0.4"/>
</svg>
