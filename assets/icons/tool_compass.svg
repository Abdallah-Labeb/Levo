<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer bezel ring -->
  <circle cx="32" cy="32" r="28" fill="#1C1C1C" stroke="#555" stroke-width="2"/>
  <!-- Inner dial face -->
  <circle cx="32" cy="32" r="24" fill="#111" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Degree tick marks -->
  <line x1="32" y1="10" x2="32" y2="14" stroke="#666" stroke-width="1.5"/>
  <line x1="32" y1="50" x2="32" y2="54" stroke="#666" stroke-width="1.5"/>
  <line x1="10" y1="32" x2="14" y2="32" stroke="#666" stroke-width="1.5"/>
  <line x1="50" y1="32" x2="54" y2="32" stroke="#666" stroke-width="1.5"/>
  <!-- Cardinal letters -->
  <text x="32" y="22" text-anchor="middle" font-family="monospace" font-size="6" font-weight="bold" fill="#E84545">N</text>
  <text x="32" y="46" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">S</text>
  <text x="44" y="34" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">E</text>
  <text x="20" y="34" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">W</text>
  <!-- North needle (red) -->
  <polygon points="32,16 29.5,32 32,30 34.5,32" fill="#E84545"/>
  <!-- South needle (chrome) -->
  <polygon points="32,48 29.5,32 32,34 34.5,32" fill="#888"/>
  <!-- Center pivot -->
  <circle cx="32" cy="32" r="3" fill="#F5C22B" stroke="#CC9F1C" stroke-width="1"/>
  <circle cx="32" cy="32" r="1.5" fill="#1A1A1A"/>
  <!-- Bezel screws -->
  <circle cx="32" cy="5" r="2" fill="#2A2A2A" stroke="#555" stroke-width="0.5"/>
  <circle cx="32" cy="59" r="2" fill="#2A2A2A" stroke="#555" stroke-width="0.5"/>
  <circle cx="5" cy="32" r="2" fill="#2A2A2A" stroke="#555" stroke-width="0.5"/>
  <circle cx="59" cy="32" r="2" fill="#2A2A2A" stroke="#555" stroke-width="0.5"/>
</svg>
