<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Meter body -->
  <rect x="10" y="28" width="44" height="26" rx="4" ry="4" fill="#1C1C1C" stroke="#555" stroke-width="1.5"/>
  <!-- Analog dial face -->
  <rect x="14" y="32" width="36" height="18" rx="2" ry="2" fill="#050505" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Dial arc -->
  <path d="M 18 46 A 14 14 0 0 1 46 46" fill="none" stroke="#2A2A2A" stroke-width="3"/>
  <path d="M 18 46 A 14 14 0 0 1 32 32" fill="none" stroke="#4EBA74" stroke-width="2.5"/>
  <path d="M 32 32 A 14 14 0 0 1 46 46" fill="none" stroke="#F5C22B" stroke-width="2.5"/>
  <!-- Needle -->
  <line x1="32" y1="46" x2="40" y2="35" stroke="#E84545" stroke-width="1.5"/>
  <circle cx="32" cy="46" r="2" fill="#888"/>
  <!-- Sensor dome on top -->
  <ellipse cx="32" cy="22" rx="10" ry="8" fill="#2A2A2A" stroke="#555" stroke-width="1.5"/>
  <ellipse cx="32" cy="20" rx="7" ry="5" fill="#F5C22B" opacity="0.15"/>
  <ellipse cx="32" cy="19" rx="4" ry="3" fill="#F5C22B" opacity="0.25"/>
  <!-- Light rays -->
  <line x1="32" y1="8" x2="32" y2="12" stroke="#F5C22B" stroke-width="1.5" opacity="0.8"/>
  <line x1="20" y1="12" x2="23" y2="15" stroke="#F5C22B" stroke-width="1.2" opacity="0.6"/>
  <line x1="44" y1="12" x2="41" y2="15" stroke="#F5C22B" stroke-width="1.2" opacity="0.6"/>
  <line x1="14" y1="18" x2="18" y2="19" stroke="#F5C22B" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="18" x2="46" y2="19" stroke="#F5C22B" stroke-width="1" opacity="0.4"/>
</svg>
