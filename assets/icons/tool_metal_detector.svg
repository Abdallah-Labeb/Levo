<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Handle -->
  <rect x="28" y="4" width="8" height="28" rx="4" ry="4" fill="#2A2A2A" stroke="#555" stroke-width="1.5"/>
  <!-- Handle grip lines -->
  <line x1="28" y1="12" x2="36" y2="12" stroke="#444" stroke-width="0.8"/>
  <line x1="28" y1="16" x2="36" y2="16" stroke="#444" stroke-width="0.8"/>
  <line x1="28" y1="20" x2="36" y2="20" stroke="#444" stroke-width="0.8"/>
  <!-- Control box -->
  <rect x="20" y="28" width="24" height="14" rx="3" ry="3" fill="#1C1C1C" stroke="#555" stroke-width="1.5"/>
  <!-- LED indicator -->
  <circle cx="28" cy="35" r="3" fill="#4EBA74" opacity="0.9"/>
  <circle cx="28" cy="35" r="2" fill="#4EBA74"/>
  <!-- Display -->
  <rect x="33" y="31" width="8" height="8" rx="1" fill="#050505" stroke="#3A3A3A" stroke-width="0.8"/>
  <text x="37" y="37" text-anchor="middle" font-family="monospace" font-size="5" fill="#4EBA74">μT</text>
  <!-- Shaft -->
  <line x1="32" y1="42" x2="32" y2="52" stroke="#888" stroke-width="2.5"/>
  <!-- Search coil -->
  <ellipse cx="32" cy="56" rx="20" ry="6" fill="none" stroke="#888" stroke-width="2"/>
  <ellipse cx="32" cy="56" rx="14" ry="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Pulse rings -->
  <ellipse cx="32" cy="56" rx="20" ry="6" fill="none" stroke="#F5C22B" stroke-width="1" opacity="0.5"/>
</svg>
