<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background panel -->
  <rect x="6" y="10" width="52" height="44" rx="5" ry="5" fill="#1C1C1C" stroke="#555" stroke-width="1.5"/>
  <!-- Top display FROM -->
  <rect x="10" y="14" width="44" height="12" rx="2" ry="2" fill="#050505" stroke="#3A3A3A" stroke-width="1"/>
  <text x="32" y="23" text-anchor="middle" font-family="monospace" font-size="8" fill="#4EBA74">1.000 m</text>
  <!-- Swap arrows -->
  <path d="M 22 30 L 18 34 L 22 38" fill="none" stroke="#F5C22B" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="34" x2="32" y2="34" stroke="#F5C22B" stroke-width="2"/>
  <path d="M 42 30 L 46 34 L 42 38" fill="none" stroke="#F5C22B" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="34" x2="32" y2="34" stroke="#F5C22B" stroke-width="2"/>
  <!-- Bottom display TO -->
  <rect x="10" y="40" width="44" height="12" rx="2" ry="2" fill="#050505" stroke="#3A3A3A" stroke-width="1"/>
  <text x="32" y="49" text-anchor="middle" font-family="monospace" font-size="7" fill="#4EBA74">1000 mm</text>
  <!-- Corner screws -->
  <circle cx="10" cy="14" r="1.5" fill="#333" stroke="#555" stroke-width="0.5"/>
  <circle cx="54" cy="14" r="1.5" fill="#333" stroke="#555" stroke-width="0.5"/>
  <circle cx="10" cy="50" r="1.5" fill="#333" stroke="#555" stroke-width="0.5"/>
  <circle cx="54" cy="50" r="1.5" fill="#333" stroke="#555" stroke-width="0.5"/>
</svg>
