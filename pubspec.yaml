name: levo
description: "Professional Measurement Toolkit — Level Everything"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.0.0

  # Sensors
  sensors_plus: ^4.0.0
  flutter_compass: ^0.7.0

  # Permissions
  permission_handler: ^11.0.0

  # Location (compass true north only)
  geolocator: ^11.0.0

  # Audio & haptic
  audioplayers: ^6.0.0
  vibration: ^1.8.0

  # Storage
  shared_preferences: ^2.2.0

  # Noise measurement
  noise_meter: ^5.0.2

  # Camera (light meter fallback)
  camera: ^0.10.0

  # SVG icons
  flutter_svg: ^2.0.9

  # In-app purchase
  in_app_purchase: ^3.1.0

  # Ads (free tier)
  google_mobile_ads: ^4.0.0

  # Wakelock
  wakelock_plus: ^1.1.0

  # Light sensor
  light: ^2.0.0

  # DI
  get_it: ^7.6.0

  # Internationalization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mocktail: ^1.0.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

